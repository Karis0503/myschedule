<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SYSTEM OS</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

body{
font-family:'Plus Jakarta Sans',sans-serif;
background:#0b0c10;
color:white;
}

.glass-card{
background:rgba(20,22,26,0.7);
backdrop-filter:blur(16px);
border:1px solid rgba(255,255,255,0.05);
border-radius:24px;
}

.timeline-container{position:relative;padding-left:40px}
.timeline-line{
position:absolute;
left:20px;
top:0;
bottom:0;
width:2px;
background:linear-gradient(to bottom,#3b82f6,#a855f7,transparent);
opacity:.2
}

.task-card{transition:.3s}

.task-dot{
position:absolute;
left:-29px;
top:22px;
width:12px;
height:12px;
background:#1e293b;
border:2px solid #3b82f6;
border-radius:50%
}

.task-card.completed{
opacity:.5;
border-color:#10b981
}

.task-card.completed .task-dot{
background:#10b981;
border-color:#10b981
}

.progress-bar{
transition:width .6s
}

@media(max-width:900px){

body{
flex-direction:column;
padding:16px;
}

aside{
width:100%;
flex-direction:row;
overflow:auto;
}

}

</style>
</head>

<body class="flex gap-6 p-6 h-screen">

<!-- SIDEBAR -->

<aside class="w-64 flex flex-col gap-8">

<h1 class="font-black text-xl flex items-center gap-2 px-4">
<i class="fas fa-microchip text-blue-500"></i>
SYSTEM<span class="text-blue-500">OS</span>
</h1>

<nav class="flex flex-col gap-2">

<button onclick="switchView('dashboard')" class="nav-btn px-5 py-3 text-left">Dashboard</button>

<button onclick="switchView('content')" class="nav-btn px-5 py-3 text-left">Content</button>

<button onclick="switchView('fitness')" class="nav-btn px-5 py-3 text-left">Fitness</button>

<button onclick="switchView('ideas')" class="nav-btn px-5 py-3 text-left">Idea Bank</button>

</nav>

<div class="mt-auto glass-card p-4">

<p class="text-xs text-gray-400 mb-2">System Integrity</p>

<div class="w-full bg-gray-800 h-2 rounded">
<div id="integrity-bar" class="progress-bar bg-blue-500 h-2 rounded" style="width:0%"></div>
</div>

<p id="integrity-percent" class="text-xs mt-2">0%</p>

<button onclick="resetSystem()" class="text-red-400 text-xs mt-3">Reset Day</button>

</div>

</aside>

<!-- MAIN AREA -->

<main class="flex-1 flex flex-col gap-6 overflow-hidden">

<!-- DASHBOARD VIEW -->

<div id="dashboard-view" class="view flex flex-col h-full">

<h2 class="text-2xl font-bold mb-4">Daily Protocol</h2>

<div class="flex-1 overflow-y-auto timeline-container">

<div class="timeline-line"></div>

<div id="protocol-list" class="space-y-4"></div>

</div>

</div>

<!-- CONTENT VIEW -->

<div id="content-view" class="view hidden">

<h2 class="text-2xl font-bold mb-6">Content Strategy</h2>

<div id="content-trackers" class="space-y-6"></div>

</div>

<!-- FITNESS VIEW -->

<div id="fitness-view" class="view hidden">

<h2 class="text-2xl font-bold mb-6">Fitness Tracker</h2>

<div id="fitness-grid" class="grid grid-cols-2 gap-4"></div>

</div>

<!-- IDEA VIEW -->

<div id="ideas-view" class="view hidden">

<h2 class="text-2xl font-bold mb-4">Idea Bank</h2>

<input id="idea-input" placeholder="New idea..." class="p-2 rounded bg-black border border-gray-700">

<button onclick="addIdea()" class="ml-2 bg-blue-600 px-4 py-2 rounded">Add</button>

<div id="idea-list" class="mt-4 space-y-2"></div>

</div>

</main>

<script>

let state=JSON.parse(localStorage.getItem("creator_os_v4"))||{

protocol:[
{ id:0,time:'04:00',task:'Wake + Prayer',desc:'Fajr',done:false },
{ id:1,time:'04:20',task:'Skipping',desc:'Jump rope',done:false,fitnessSync:'skipping'},
{ id:2,time:'04:40',task:'Running',desc:'Jog',done:false,fitnessSync:'running'},
{ id:3,time:'05:10',task:'Workout',desc:'Pushups Squats',done:false,fitnessSync:'workout'},
{ id:4,time:'06:00',task:'Deep Work',desc:'Tech Short',done:false,contentSync:'tech'},
{ id:5,time:'09:00',task:'Internship',desc:'Upload Brainrot',done:false,contentSync:'brainrot'},
{ id:6,time:'19:00',task:'Growth Session',desc:'Ideas Research',done:false}
],

content:{
brainrot:{count:0,target:2,label:'Brainrot Shorts'},
tech:{count:0,target:1,label:'Tech Shorts'},
money:{count:0,target:1,label:'Money Protocol'}
},

fitness:{
skipping:false,
running:false,
workout:false
},

ideas:["AI tools that make money"]

}

function renderAll(){
renderTimeline()
renderContent()
renderFitness()
renderIdeas()
updateIntegrity()
localStorage.setItem("creator_os_v4",JSON.stringify(state))
}

function renderTimeline(){

const list=document.getElementById("protocol-list")

list.innerHTML=state.protocol.map(item=>`

<div onclick="toggleTask(${item.id})"
class="task-card glass-card p-4 cursor-pointer relative ${item.done?'completed':''}">

<div class="task-dot"></div>

<p class="text-xs text-blue-400">${item.time}</p>

<h4 class="font-bold">${item.task}</h4>

<p class="text-xs text-gray-400">${item.desc}</p>

</div>

`).join("")

}

function renderContent(){

const c=document.getElementById("content-trackers")

c.innerHTML=Object.entries(state.content).map(([k,v])=>{

const perc=(v.count/v.target)*100

return`

<div>

<div class="flex justify-between text-xs mb-2">

<span>${v.label}</span>

<span>${v.count}/${v.target}</span>

</div>

<div class="w-full h-2 bg-gray-800 rounded">

<div class="progress-bar bg-blue-500 h-2 rounded" style="width:${perc}%"></div>

</div>

</div>

`

}).join("")

}

function renderFitness(){

const grid=document.getElementById("fitness-grid")

grid.innerHTML=Object.entries(state.fitness).map(([k,v])=>`

<div class="glass-card p-4 text-center ${v?'text-green-400':''}">

${k}

</div>

`).join("")

}

function renderIdeas(){

const list=document.getElementById("idea-list")

list.innerHTML=state.ideas.map(i=>`<div class="glass-card p-2">${i}</div>`).join("")

}

function toggleTask(id){

const t=state.protocol.find(x=>x.id===id)

t.done=!t.done

if(t.fitnessSync) state.fitness[t.fitnessSync]=t.done

if(t.contentSync){

state.content[t.contentSync].count=t.done?state.content[t.contentSync].target:0

}

renderAll()

}

function updateIntegrity(){

const total=state.protocol.length

const done=state.protocol.filter(p=>p.done).length

const perc=Math.round(done/total*100)

document.getElementById("integrity-bar").style.width=perc+"%"

document.getElementById("integrity-percent").innerText=perc+"%"

}

function switchView(view){

document.querySelectorAll(".view").forEach(v=>v.classList.add("hidden"))

document.getElementById(view+"-view").classList.remove("hidden")

}

function addIdea(){

const input=document.getElementById("idea-input")

if(!input.value)return

state.ideas.push(input.value)

input.value=""

renderAll()

}

function resetSystem(){

state.protocol.forEach(p=>p.done=false)

state.content.brainrot.count=0

state.content.tech.count=0

state.content.money.count=0

state.fitness={skipping:false,running:false,workout:false}

renderAll()

}

renderAll()

</script>

</body>
</html>
